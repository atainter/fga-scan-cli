name: Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag name (e.g., v1.0.0-beta.1)
        type: string
        default: ''
  workflow_call:
    inputs:
      tag_name:
        description: Release tag name (e.g., v1.0.0-beta.1)
        type: string
        default: ''

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Determine npm tag
        id: npm-tag
        env:
          TAG_NAME: ${{ inputs.tag_name }}
        run: |
          if [[ "$TAG_NAME" == *"-"* ]]; then
            echo "tag=beta" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish
        run: npm publish --tag ${{ steps.npm-tag.outputs.tag }} --access public --provenance
